<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9fafb;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2d89ef;
        }
        p {
            font-size: 1.1em;
            margin: 20px 0;
        }
        a.button {
            display: inline-block;
            padding: 12px 25px;
            background-color: #2d89ef;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        a.button:hover {
            background-color: #1b5fa7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Thank You!</h1>
        <p>Your email has been successfully submitted.  
           We’ll be in touch soon </p>
        <a href="/" class="button">Back to Home</a>
    </div>
</body>
</html>
